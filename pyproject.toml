[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

# ---------- Tooling ----------

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers --strict-config"
filterwarnings = [
    "ignore::DeprecationWarning:sklearn.*",
]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["notebooks", "data", "models", "reports"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM", "C4"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py310", "py311"]
exclude = '''
/(
    \.git
  | \.venv
  | notebooks
  | data
  | models
  | reports
)/
'''

[tool.coverage.run]
source = ["src"]
omit = ["src/notebook_builder.py", "src/cli.py"]
